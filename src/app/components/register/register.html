<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">MyApp</div>
      <div class="brand-title">Register</div>
    </div>

    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="fullName" class="form-label"> Full Name </label>
        <input  class="input" name="fullName"  type="text" placeholder="Enter Name" formControlName="fullName"  [class.is-invalid]="formControl['fullName'].touched && formControl['fullName'].invalid " />
      </div>
      <div class="alert alert-danger"
      *ngIf="formControl['fullName'].touched && formControl['fullName'].errors?.['required']">
      This field is required
      </div>
      
      
      <div class="form-group">
      <label  for="email" class="form-label"> Email </label>
        <input class="input"  type="email" placeholder="Enter email" name="email" formControlName="email" [class.is-invalid]="formControl['email'].touched && formControl['email'].invalid "/>
       </div>   
        <div class="alert alert-danger" *ngIf="formControl['email'].touched && formControl['email'].errors?.['required']">
          
              This field is required

            <!-- <div *ngIf="formControl['email'].touched && formControl['email'].errors?.['email'] ">
              Enter valid email
            </div> -->
        </div>
     
        
       <div class="form-group">
      <label class="label">  Phone</label>
        <input class="input"   name="phone" type="tel" formControlName="phone" placeholder="Enter phone number" />
        <div class="field-error" *ngIf="formControl['phone'].invalid && (formControl['phone'].dirty || formControl['phone'].touched)">
          Enter a valid 10-digit phone number.
        </div>
      </div>

      <div class="form-group">
    <label for="gender" class="form-label">Gender</label>

    <label class="form-label">
      <input type="radio" name="gender" value="Male" formControlName="gender" /> Male
    </label>

    <label class="form-label">
      <input type="radio" name="gender" value="Female" formControlName="gender" /> Female
    </label>

    <label class="form-label">
      <input type="radio" name="gender" value="Other" formControlName="gender" /> Other
    </label>
  </div>

      <div class="form-group">
    <label class="form-label" for="city">City</label>
    <select class="input" formControlName="city">
      <option value="" disabled selected>Select city</option>
      <option *ngFor="let cityName of cityOptions" [value]="cityName">
        {{ cityName }}
      </option>
    </select>

    <div class="alert alert-danger"
      *ngIf="formControl['city'].invalid && (formControl['city'].dirty || formControl['city'].touched)">
      Please select city.
    </div>
  </div>

      <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <input class="input" type="password" formControlName="password" placeholder="Enter Password"
      [class.is-invalid]="formControl['password'].touched && formControl['password'].invalid" />

    <div class="alert alert-danger"
      *ngIf="formControl['password'].touched && formControl['password'].errors?.['required']">
      Password is required
    </div>
  </div>
    
      <!-- Confirm Password -->
  <div class="form-group">
    <label  for="confirmPassword" class="form-label">Confirm Password</label>
    <input class="input" type="password" formControlName="confirmPassword" placeholder="Confirm Password"
    [class.is-invalid]="formControl['confirmPassword'].touched && formControl['confirmPassword'].invalid"/>

    <div class="alert alert-danger"
      *ngIf="formControl['confirmPassword'].touched && formControl['confirmPassword'].errors?.['required']">
      Confirm password must match password.
    </div>
  </div>

       <!-- Submit -->
  <button class="btn" type="submit" [disabled]="myForm.invalid || submitting">
    {{ submitting ? 'Creating...' : 'Register' }}
  </button>

      <div class="links">
        <button type="button" class="link-btn" (click)="goToLogin()">Back to login</button>
      </div>

      <div class="message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="success" *ngIf="successMessage">
        {{ successMessage }}
      </div>
    </form>
  </div>
</div>
