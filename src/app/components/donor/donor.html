<div class="donor-dashboard">

  <header class="dashboard-header">
    <div class="logo">MyApp</div>
    <div class="user-info">
      <span>Welcome, Donor</span>
      <button class="btn logout" (click)="logout()">Logout</button>
    </div>
  </header>

  <aside class="sidebar">
    <nav>
      <ul>
        <li><a routerLink="/donor/profile">Profile</a></li>
        <li><a routerLink="/donor/donations">My Donations</a></li>
        <li><a routerLink="/donor/history">Donation History</a></li>
        <li><a routerLink="/donor/help">Help</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <div class="cards">
      <div class="card">
        <h3>Total Donations</h3>
        <p>15</p>
      </div>
      <div class="card">
        <h3>Active Campaigns</h3>
        <p>3</p>
      </div>
      <div class="card">
        <h3>Upcoming Events</h3>
        <p>2</p>
      </div>
    </div>

    <section class="recent-activity">
      <h2>Recent Donations</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Campaign</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2026-03-28</td>
            <td>Blood Drive</td>
            <td>$50</td>
            <td>Completed</td>
          </tr>
          <tr>
            <td>2026-03-20</td>
            <td>Food Donation</td>
            <td>$30</td>
            <td>Pending</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

</div>
