<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">MyApp</div>
      <div class="brand-title">Login</div>
    </div>

    <form class="form" [formGroup]="myForm" (ngSubmit)="onSubmit()">

      <label class="label">
        Email
        <input
          class="input"
          type="email"
          formControlName="email"
          autocomplete="email"
        />
      </label>
      
      <div class="alert alert-danger" *ngIf="formControl.email.touched && formControl.email.invalid">
        <small *ngIf="formControl.email.errors?.['required']">
          Email is required
        </small>
        <small *ngIf="formControl.email.errors?.['email']">
          Invalid email format
        </small>
      </div>

      <label class="label">
        Password
        <input
          class="input"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </label>

      
      <div class="alert alert-danger" *ngIf="formControl.password.touched && formControl.password.invalid">
        <small>Password is required</small>
      </div>

      <div class="links">
  <button type="button" class="link-btn" (click)="openForgotModal()">
    Forgot Password?
  </button>
</div>

      <button
        class="btn"
        type="submit"
        [disabled]="submitting || myForm.invalid"
      >
        {{ submitting ? 'Logging in...' : 'Login' }}
      </button>

      <div class="links">
        <button type="button" class="link-btn" (click)="goToRegister()">
          Create account
        </button>
      </div>

      <div class="message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

    </form>
  </div>
</div>

<div *ngIf="showForgotModal" class="forgot-modal-backdrop">
  <div class="forgot-modal-card">
    <h3>Forgot Password</h3>

    <label>Email</label>
    <input type="email" [(ngModel)]="forgotData.email" placeholder="Enter your email" />

    <label>New Password</label>
    <input type="password" [(ngModel)]="forgotData.password" placeholder="Enter new password" />

    <div class="forgot-modal-buttons">
      <button (click)="submitForgotPassword()">Reset Password</button>
      <button (click)="closeForgotModal()">Cancel</button>
    </div>
  </div>
</div>
